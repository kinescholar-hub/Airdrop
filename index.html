    <script type="module">

        window.fbAPI = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, arrayUnion };
    </script>

    <style>
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif !important; -webkit-tap-highlight-color: transparent; }

<body>
    <!-- Fallback Pre-loader in case React fails -->
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; text-align: center;">
            <div style="width: 40px; height: 40px; border: 3px solid #0A84FF; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
            <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 8px;">Loading Peak Engine</h2>
            <p style="color: #888; font-size: 14px;">Establishing secure environment...</p>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'aerodrop-peak';
        let app, auth, db;

        // --- 100% Stable Hardcoded Icons (No Fragments) ---
        const IconSend = ({ size = 28, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>;
        const IconReceive = ({ size = 28, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconWifi = ({ size = 40, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>;
        const IconFile = ({ size = 20, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>;
        const IconCheck = ({ size = 20, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;

        // --- Peak Performance WebRTC Settings ---
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        const CHUNK_SIZE = 256 * 1024; // 256KB max local throughput chunk
        const BUFFER_LIMIT = 1024 * 1024; // 1MB Pressure threshold

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); // home, connect, transfer
            const [role, setRole] = useState(null); // host, join
            const [pin, setPin] = useState('');
            const [connStatus, setConnStatus] = useState('Offline');
            
            const [queue, setQueue] = useState([]);
            const [history, setHistory] = useState([]);
            const [activeTx, setActiveTx] = useState(null); // { name, progress, dir }

            const pcRef = useRef(null);
            const dcRef = useRef(null);
            const unsubRef = useRef(null);

            const rxBuf = useRef([]);
            const rxSize = useRef(0);
            const rxMeta = useRef(null);

            // 1. Backend Authentication Loop
            useEffect(() => {
                const initAuth = () => {
                    const timer = setInterval(async () => {
                        if (window.fbAPI) {
                            clearInterval(timer);
                            try {
                                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "demo" };
                                app = window.fbAPI.initializeApp(config);
                                auth = window.fbAPI.getAuth(app);
                                db = window.fbAPI.getFirestore(app);

                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await window.fbAPI.signInWithCustomToken(auth, __initial_auth_token);
                                } else {
                                    await window.fbAPI.signInAnonymously(auth);
                                }
                                window.fbAPI.onAuthStateChanged(auth, setUser);
                            } catch (e) {
                                console.error("Database connection failed", e);
                            }
                        }
                    }, 100);
                };
                initAuth();
                return () => { if (unsubRef.current) unsubRef.current(); };
            }, []);

            // 2. WebRTC Setup
            const buildPC = () => {
                const pc = new RTCPeerConnection(rtcConfig);
                pcRef.current = pc;
                pc.oniceconnectionstatechange = () => {
                    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') disconnect();
                };
                return pc;
            };

            const setupChannel = (dc) => {
                dc.binaryType = 'arraybuffer';
                dcRef.current = dc;
                dc.onopen = () => {
                    setView('transfer');
                    setConnStatus('Direct Link Active');
                    if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
                };
                dc.onclose = disconnect;
                dc.onmessage = handleDataMsg;
            };

            const disconnect = () => {
                if (dcRef.current) dcRef.current.close();
                if (pcRef.current) pcRef.current.close();
                if (unsubRef.current) unsubRef.current();
                pcRef.current = null; dcRef.current = null;
                setView('home'); setRole(null); setPin(''); setActiveTx(null); setQueue([]);
                setConnStatus('Offline');
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
            };

            // 3. Signaling (The Handshake)
            const handleHost = async () => {
                if (!user || !db) return;
                setView('connect'); setRole('host'); setConnStatus('Generating PIN...');
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setPin(code);

                const pc = buildPC();
                const dc = pc.createDataChannel('aero_data', { negotiated: false });
                setupChannel(dc);

                // Correct Firestore Pathing Rule Applied Here
                const roomRef = window.fbAPI.doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);

                pc.onicecandidate = async (e) => {
                    if (e.candidate) await window.fbAPI.updateDoc(roomRef, { caller: window.fbAPI.arrayUnion(e.candidate.toJSON()) });
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                await window.fbAPI.setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp }, caller: [], callee: [] });

                unsubRef.current = window.fbAPI.onSnapshot(roomRef, async (snap) => {
                    const data = snap.data();
                    if (!data) return;
                    if (!pc.currentRemoteDescription && data.answer) {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    }
                    if (data.callee && data.callee.length > 0) {
                        data.callee.forEach(async c => { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} });
                    }
                });
            };

            const handleJoin = async (codeStr) => {
                if (!user || !db || codeStr.length !== 6) return;
                setView('connect'); setRole('join'); setPin(codeStr); setConnStatus('Linking Devices...');

                const roomRef = window.fbAPI.doc(db, 'artifacts', appId, 'public', 'data', 'rooms', codeStr);
                
                try {
                    const snap = await window.fbAPI.getDoc(roomRef);
                    if (!snap.exists()) { alert("PIN expired or invalid."); disconnect(); return; }

                    const pc = buildPC();
                    pc.ondatachannel = (e) => setupChannel(e.channel);
                    
                    pc.onicecandidate = async (e) => {
                        if (e.candidate) await window.fbAPI.updateDoc(roomRef, { callee: window.fbAPI.arrayUnion(e.candidate.toJSON()) });
                    };

                    const data = snap.data();
                    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    
                    await window.fbAPI.updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });

                    unsubRef.current = window.fbAPI.onSnapshot(roomRef, (snap) => {
                        const d = snap.data();
                        if (d && d.caller) d.caller.forEach(async c => { try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){} });
                    });
                } catch(e) {
                    alert("Network error."); disconnect();
                }
            };

            // 4. Data Transfer (Peak Throughput)
            const handleDataMsg = (e) => {
                if (typeof e.data === 'string') {
                    const meta = JSON.parse(e.data);
                    rxMeta.current = meta; rxBuf.current = []; rxSize.current = 0;
                    setActiveTx({ name: meta.name, progress: 0, dir: 'rx' });
                } else {
                    rxBuf.current.push(e.data);
                    rxSize.current += e.data.byteLength;
                    
                    const meta = rxMeta.current;
                    if (meta) {
                        const pct = (rxSize.current / meta.size) * 100;
                        if (Math.floor(pct) % 5 === 0 || pct >= 100) setActiveTx(p => ({ ...p, progress: pct }));
                        if (rxSize.current === meta.size) finishReceive();
                    }
                }
            };

            const finishReceive = () => {
                const meta = rxMeta.current;
                const blob = new Blob(rxBuf.current, { type: meta.type || 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a'); a.href = url; a.download = meta.name;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                
                setHistory(prev => [{ name: meta.name, size: meta.size, dir: 'rx' }, ...prev]);
                if(navigator.vibrate) navigator.vibrate([15, 30, 15]);
                
                setTimeout(() => setActiveTx(null), 1500);
                rxMeta.current = null; rxBuf.current = [];
            };

            useEffect(() => {
                if (view === 'transfer' && queue.length > 0 && !activeTx) processQueue();
            }, [queue, view, activeTx]);

            const processQueue = async () => {
                const file = queue[0];
                const dc = dcRef.current;
                if (!file || !dc || dc.readyState !== 'open') return;

                dc.send(JSON.stringify({ name: file.name, size: file.size, type: file.type }));
                setActiveTx({ name: file.name, progress: 0, dir: 'tx' });

                let offset = 0;
                
                const pumpData = async () => {
                    if (offset >= file.size) {
                        setHistory(prev => [{ name: file.name, size: file.size, dir: 'tx' }, ...prev]);
                        setQueue(q => q.slice(1));
                        if(navigator.vibrate) navigator.vibrate([15, 30, 15]);
                        setTimeout(() => setActiveTx(null), 1500);
                        return;
                    }
                    if (dc.bufferedAmount > BUFFER_LIMIT) {
                        dc.onbufferedamountlow = () => { dc.onbufferedamountlow = null; pumpData(); };
                        return;
                    }
                    
                    const slice = file.slice(offset, offset + CHUNK_SIZE);
                    const buf = await slice.arrayBuffer();
                    dc.send(buf);
                    offset += buf.byteLength;
                    
                    const pct = (offset / file.size) * 100;
                    if (Math.floor(pct) % 5 === 0 || pct >= 100) setActiveTx(p => ({ ...p, progress: pct }));
                    
                    // Prevent blocking the main thread during massive gigabyte transfers
                    if (offset % (CHUNK_SIZE * 10) === 0) setTimeout(pumpData, 0); else pumpData();
                };
                pumpData();
            };

            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    setQueue(prev => [...prev, ...Array.from(e.target.files)]);
                    if(navigator.vibrate) navigator.vibrate(15);
                }
            };

            const fmtBytes = (b) => { if (!b) return '0 B'; const k = 1024, s = ['B', 'KB', 'MB', 'GB']; const i = Math.floor(Math.log(b) / Math.log(k)); return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + s[i]; };

            // 5. Render UI
            return (
                <div className="flex flex-col h-full w-full max-w-xl mx-auto px-5 py-10 font-sans">
                    
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8 shrink-0">
                        <h1 className="text-2xl font-extrabold tracking-tight">AeroDrop</h1>
                        <div className="flex items-center gap-2 bg-[#1C1C1E] border border-[rgba(255,255,255,0.1)] px-3 py-1.5 rounded-full">
                            <div className={`w-2.5 h-2.5 rounded-full ${view === 'transfer' ? 'bg-[#30D158] shadow-[0_0_8px_rgba(48,209,88,0.8)]' : view === 'connect' ? 'bg-[#FFD60A] animate-pulse' : 'bg-[#8E8E93]'}`}></div>
                            <span className="text-[11px] font-bold uppercase tracking-widest text-[#EBEBF5]">{connStatus}</span>
                        </div>
                    </div>

                    {/* Main Workspace */}
                    <div className="flex-1 flex flex-col justify-center">
                        
                        {view === 'home' && (
                            <div className="flex flex-col gap-6 fade-in w-full">
                                {!user ? (
                                    <div className="glass-card p-10 flex flex-col items-center justify-center text-center h-[400px]">
                                        <div className="w-10 h-10 border-4 border-[#0A84FF] border-t-transparent rounded-full animate-spin mb-6"></div>
                                        <h2 className="text-xl font-bold mb-2">Connecting to Secure Relay</h2>
                                        <p className="text-[#8E8E93] text-sm">Please wait...</p>
                                    </div>
                                ) : (
                                    <>
                                        <div className="flex-1 bg-[#141415] border border-[rgba(255,255,255,0.08)] rounded-[32px] p-6 flex flex-col gap-6 shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
                                            {/* Big Send Button */}
                                            <button onClick={handleHost} className="btn-press flex-1 bg-[#0A84FF] rounded-[24px] flex flex-col items-center justify-center p-8 text-white shadow-[0_10px_20px_rgba(10,132,255,0.3)]">
                                                <div className="bg-white/20 p-4 rounded-full mb-4"><IconSend size={36} /></div>
                                                <h2 className="text-2xl font-bold mb-1">Send Files</h2>
                                                <p className="text-white/70 text-sm font-medium">Generate PIN</p>
                                            </button>

                                            {/* Big Receive Input */}
                                            <div className="flex-1 bg-[#1C1C1E] border border-[rgba(255,255,255,0.05)] rounded-[24px] flex flex-col items-center justify-center p-8">
                                                <div className="bg-[#30D158]/10 text-[#30D158] p-4 rounded-full mb-4"><IconReceive size={36} /></div>
                                                <h2 className="text-2xl font-bold mb-4">Receive Files</h2>
                                                <input 
                                                    type="text" placeholder="Enter PIN" maxLength="6"
                                                    className="w-full max-w-[200px] bg-[#000] border border-[rgba(255,255,255,0.15)] py-4 text-center text-2xl tracking-[0.3em] rounded-xl focus:outline-none focus:border-[#30D158] text-white font-mono transition-colors"
                                                    onChange={e => { const v = e.target.value.replace(/\D/g, ''); e.target.value = v; if (v.length === 6) handleJoin(v); }}
                                                />
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {view === 'connect' && (
                            <div className="glass-card p-10 flex flex-col items-center justify-center text-center fade-in h-[450px]">
                                <div className="text-[#0A84FF] mb-8 animate-pulse"><IconWifi size={64} /></div>
                                <h2 className="text-3xl font-bold mb-3">{role === 'host' ? 'Ready to Pair' : 'Linking Devices'}</h2>
                                
                                {role === 'host' && (
                                    <>
                                        <p className="text-[#8E8E93] text-sm mb-8 font-medium">Enter this PIN on your other device.</p>
                                        <div className="bg-[#000] border border-[rgba(255,255,255,0.1)] px-10 py-6 rounded-2xl w-full mb-8">
                                            <span className="text-5xl tracking-[0.3em] font-bold text-[#0A84FF] ml-3 font-mono">{pin}</span>
                                        </div>
                                    </>
                                )}
                                
                                <button onClick={disconnect} className="btn-press text-[#8E8E93] font-bold bg-[#222] px-8 py-3 rounded-full hover:text-white">Cancel</button>
                            </div>
                        )}

                        {view === 'transfer' && (
                            <div className="flex flex-col h-full gap-5 fade-in">
                                
                                {/* Active Action Banner */}
                                {activeTx && (
                                    <div className="bg-[#1C1C1E] border border-[rgba(255,255,255,0.1)] rounded-2xl p-5 shrink-0 flex flex-col gap-3 shadow-lg">
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-3 overflow-hidden">
                                                <div className="w-10 h-10 rounded-full bg-[#0A84FF]/20 text-[#0A84FF] flex items-center justify-center shrink-0">
                                                    {activeTx.progress === 100 ? <IconCheck size={20} /> : activeTx.dir === 'tx' ? <IconSend size={18} /> : <IconReceive size={18} />}
                                                </div>
                                                <div className="min-w-0">
                                                    <p className="text-[10px] font-bold text-[#8E8E93] uppercase tracking-widest mb-0.5">{activeTx.dir === 'tx' ? 'Sending' : 'Receiving'}</p>
                                                    <p className="text-sm font-bold text-white truncate max-w-[200px]">{activeTx.name}</p>
                                                </div>
                                            </div>
                                            <span className="text-[#0A84FF] font-bold font-mono">{Math.floor(activeTx.progress)}%</span>
                                        </div>
                                        <div className="w-full h-1.5 bg-black rounded-full overflow-hidden">
                                            <div className="h-full bg-[#0A84FF] transition-all duration-200" style={{ width: `${activeTx.progress}%` }}></div>
                                        </div>
                                    </div>
                                )}

                                {/* Main Persistent Dropzone */}
                                <div className={`glass-card flex-1 min-h-[250px] relative overflow-hidden flex flex-col items-center justify-center border-2 border-dashed border-[rgba(255,255,255,0.1)] transition-all ${activeTx && activeTx.progress < 100 ? 'opacity-40 pointer-events-none' : 'hover:bg-[#0A84FF]/5 hover:border-[#0A84FF]/40'}`}>
                                    <input type="file" multiple onChange={handleFileSelect} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <div className="w-20 h-20 rounded-full bg-[#0A84FF] text-white flex items-center justify-center mb-5 shadow-[0_5px_15px_rgba(10,132,255,0.4)]">
                                        <IconSend size={36} />
                                    </div>
                                    <h3 className="text-3xl font-bold mb-2">Tap to Send</h3>
                                    <p className="text-[#8E8E93] font-medium text-sm">Select photos or documents</p>
                                </div>

                                {/* History / Queue Layout */}
                                <div className="glass-card p-5 shrink-0 h-[220px] flex flex-col">
                                    <h4 className="text-[10px] font-bold text-[#8E8E93] uppercase tracking-widest mb-3">Session Activity</h4>
                                    <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                                        {queue.map((f, i) => (
                                            <div key={`q-${i}`} className="bg-[#222] rounded-xl p-3 flex justify-between items-center opacity-70">
                                                <div className="flex items-center gap-3 overflow-hidden"><IconFile size={16} className="text-gray-500 shrink-0"/><span className="text-sm font-semibold truncate text-white">{f.name}</span></div>
                                                <span className="text-xs text-[#8E8E93] font-mono shrink-0 ml-3">Queued</span>
                                            </div>
                                        ))}
                                        {history.map((h, i) => (
                                            <div key={`h-${i}`} className="bg-black/60 rounded-xl p-3 flex justify-between items-center border border-[rgba(255,255,255,0.05)]">
                                                <div className="flex items-center gap-3 overflow-hidden">
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${h.dir === 'tx' ? 'bg-[#0A84FF]/10 text-[#0A84FF]' : 'bg-[#30D158]/10 text-[#30D158]'}`}>
                                                        {h.dir === 'tx' ? <IconSend size={14} /> : <IconReceive size={14} />}
                                                    </div>
                                                    <span className="text-sm font-medium truncate text-white">{h.name}</span>
                                                </div>
                                                <span className="text-[11px] text-[#8E8E93] font-mono font-bold shrink-0 ml-3">{fmtBytes(h.size)}</span>
                                            </div>
                                        ))}
                                        {queue.length === 0 && history.length === 0 && (
                                            <div className="h-full flex items-center justify-center text-[#555] text-sm font-medium">No activity yet.</div>
                                        )}
                                    </div>
                                </div>
                                
                                <button onClick={disconnect} className="btn-press bg-[#FF453A]/10 text-[#FF453A] font-bold text-sm py-4 rounded-2xl w-full border border-[#FF453A]/20">End Session</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
